<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte Tarifaire</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f4f4;
        }

        .pricing {
            width: 320px;
            background-color: #ffffff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            padding: 25px;
            border-radius: 12px;
            text-align: center;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }

        .price {
            font-size: 28px;
            font-weight: bold;
            color: #28a745;
            margin-bottom: 20px;
        }

        .features {
            list-style: none;
            margin-bottom: 20px;
        }

        .features li {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            color: #555;
        }

        .features li:last-child {
            border-bottom: none;
        }

        .btn {
            display: inline-block;
            width: 100%;
            background-color: #007bff;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        .btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="pricing">
        <h2 class="title">Forfait de base</h2>

        <p class="price">19 000 FCFA/mois</p>

        <ul class="features">
            <li>1 Go de stockage</li>
            <li>Assistance de base</li>
            <li>Toutes les fonctionnalités principales</li>
        </ul>

        <button class="btn" onclick="startTrial()">
            Démarrer l'essai
        </button>
    </div>

    <script>
        function startTrial() {
            alert("Essai démarré avec succès !");
        }
    </script>

</body>
</html>
